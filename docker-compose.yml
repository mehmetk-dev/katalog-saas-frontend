version: '3.8'

services:
  # --- Cloudflare Tunnel (Yeni Eklenen) ---
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Token'ı env dosyasından alır
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - default

  # --- Frontend ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    # ports: "3000:3000"  <-- SİLDİM (Artık Tunnel taşıyor, dışarı kapalı)
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # Buraya Cloudflare domain adresini yazacaksın (.env dosyasında)
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_URL=http://backend:4000/api/v1
      - WORKER_EXPORT_SECRET=${WORKER_EXPORT_SECRET}
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  # --- Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ports: "4000:4000" <-- SİLDİM (Güvenlik için kapalı)
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      # DİKKAT: Typonu düzelttim (fogistanul -> fogistanbul) ve HTTPS ekledim
      - ALLOWED_ORIGINS=http://localhost:3000,https://fogcatalog.com,https://www.fogcatalog.com
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - WORKER_EXPORT_SECRET=${WORKER_EXPORT_SECRET}
      - PUBLIC_API_URL=${PUBLIC_API_URL}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_PDF_EXPORT_PREFIX=${R2_PDF_EXPORT_PREFIX}
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider --header 'Origin: http://localhost:3000' http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  # --- PDF Export Worker ---
  pdf-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: node dist/workers/pdf-export-worker.js
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - WORKER_EXPORT_SECRET=${WORKER_EXPORT_SECRET}
      - PDF_EXPORT_RENDER_ORIGIN=http://frontend:3000
      - PDF_EXPORT_WORKER_CONCURRENCY=${PDF_EXPORT_WORKER_CONCURRENCY:-1}
      - PDF_EXPORT_CLEANUP_INTERVAL_MS=${PDF_EXPORT_CLEANUP_INTERVAL_MS:-3600000}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_PDF_EXPORT_PREFIX=${R2_PDF_EXPORT_PREFIX}
    depends_on:
      - frontend
      - backend
      - redis
    restart: unless-stopped
    networks:
      - default

  # --- Redis ---
  redis:
    image: redis:7-alpine
    # ports: "6379:6379" <-- SİLDİM (Sadece backend erişsin, dışarı kapalı)
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default

volumes:
  redis_data:

# Network configuration
networks:
  default:
    # Senin mevcut ağın
    name: katalog-nw
    # Eğer bu ağı elle (manual) oluşturduysan alt satırı aç:
    # external: true
